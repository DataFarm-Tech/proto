// telemetry.pb.c/.pb.h are committed generated code, not built at compile
// time by consumers (the firmware's ESP-IDF nanopb component only vendors
// the runtime, not the generator). After editing this file or
// telemetry.options, regenerate with:
//
//   pip install --user nanopb
//   nanopb_generator -I. telemetry.proto
//
// then commit the updated telemetry.pb.c/.pb.h alongside this file.
// See README.md for details.
syntax = "proto3";

option java_package = "com.datafarmtech.telemetry";
option java_multiple_files = true;

message ActivateRequest {
    string   node_id   = 1;
    Position position  = 3;
    Battery  battery   = 4;
    Manf     manf      = 5;
    NetInfo  net_info  = 6;
}

message Manf {
  string fw_ver      = 1;
  string hw_ver      = 2;
  string chassis_ver = 3;
}

message GpsUpdateRequest {
    string   node_id  = 1;
    Position position = 2;
    Battery  battery  = 3;
    OtaStatus firmware = 4;
    NetStat  net_stat = 5;
}

message OtaStatus {
    string fw_ver    = 1;
    bool just_updated = 2;
    uint32 boot_count  = 3;
}

message Battery {
  float voltage  = 1; // volts, straight off the fuel-gauge/ADC reading
  float soc      = 2; // state of charge, percent 0-100
  bool  charging = 3; // true if actively charging (e.g. solar input present)
  float temp_c   = 4; // battery temperature, Celsius
}

message Position {
  float   lat        = 1;
  float   lon        = 2;
  fixed32 fix_time   = 3; // unix epoch seconds of the fix itself, not of message receipt
  float   accuracy_m = 4; // estimated horizontal accuracy, metres
  bool    fix_valid  = 5; // false if this is a stale/last-known fallback position, not a live fix
}

// SIM/module identity — fixed to the physical hardware, doesn't change without a SIM swap.
message NetInfo {
  string iccid = 1;
  string imei  = 2;
  string imsi  = 3;
}

// Which cell/network the device is on right now, and how good that connection is —
// travels with each GpsUpdateRequest so it can be correlated with position over time.
message NetStat {
  sint32 rsrq     = 1;
  sint32 sinr     = 2;
  string carrier  = 3; // mobile network operator name (not "operator" -- that's a reserved word in C++, which nanopb's generated struct must compile under)
  bytes  cell_id  = 4;
  uint32 band     = 5;
  uint32 lac      = 6;
  uint32 rat      = 7;
}

message ReadingRequest {
    reserved 3;
    reserved "readings";

    string node_id  = 1;
    string m_type    = 2;
    uint64 session   = 4;
    // Already scaled to physical units and aggregated on-device (divisor
    // conversion, min/max range filter, z-score outlier rejection, median)
    // -- the server only classifies/persists this value, it no longer
    // aggregates raw samples itself.
    float  reading   = 5;
}

message StringValue {
    string value = 1;
}

// Minimal liveness/identity ping sent once, right after the device connects
// to the network -- deliberately lightweight (no signal/network info, which
// travels with GpsUpdateRequest.net_stat moments later) so it lands quickly
// even if GPS acquisition or the rest of the boot cycle takes a while.
message HealthRequest {
    string node_id     = 1;
    string boot_reason = 2; // e.g. "power-on", "deep sleep wake", "task watchdog"
    string fw_ver      = 3;
}

// Sent alongside the GET to /config so the server knows which node's
// config to look up -- the request itself carries no other CoAP-level
// identity, unlike POST/PUT endpoints where node_id travels with the rest
// of the payload.
message ConfigRequest {
    string node_id = 1;
}

// Node configuration fetched via a GET right after connecting, alongside
// HealthRequest -- looked up from the node_config table server-side.
message ConfigResponse {
    uint32 main_app_delay = 1; // seconds between check-in cycles

    // If true, a wake whose primary (SIM) connection fails to come up
    // retries once over WiFi before giving up on the wake entirely. Doesn't
    // change the primary connection method -- SIM is still tried first on
    // every wake regardless of this flag.
    bool wifi_backup_enabled = 2;

    // Credentials for the WiFi backup connection above. Consumers may treat
    // an empty value as "no change" and keep whatever WiFi credentials
    // (build-time default or previously configured) they already have.
    string wifi_ssid     = 3;
    string wifi_password = 4;
}

// One chunk of the node's system.log file, sent right after HealthRequest
// at boot. The log can exceed a single UDP/OSCORE payload, so it's split
// into fixed-size chunks and reassembled server-side by (node_id,
// upload_id) -- upload_id is just the node's boot_count, reused rather
// than tracking a separate counter, since one upload happens per boot.
message LogChunk {
    string node_id     = 1;
    uint32 upload_id    = 2;
    uint32 chunk_index  = 3; // 0-based
    uint32 total_chunks = 4;
    string data         = 5;
}
